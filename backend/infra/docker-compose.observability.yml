services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: dqc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - dqc_elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dqc_observability

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: dqc-logstash
    depends_on:
      - elasticsearch
    volumes:
      - ../logs/dqc:/logs/dqc:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - dqc_observability

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: dqc-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - dqc_observability

volumes:
  dqc_elasticsearch_data:

networks:
  dqc_observability:
    driver: bridge

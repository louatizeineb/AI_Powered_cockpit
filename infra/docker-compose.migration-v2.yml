services:
  neo4j-migration-v2:
    image: neo4j:5-community
    container_name: neo4j-migration-v2
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: neo4j/${MIGRATION_V2_NEO4J_PASSWORD:-change_me}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - migration_v2_neo4j_data:/data

volumes:
  migration_v2_neo4j_data:


services:
  redis:
    image: redis:7-alpine
    container_name: lineage-search-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
      - --schema-registry-addr 0.0.0.0:8081
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_SCHEMAREGISTRY_URL: http://redpanda:8081
    depends_on:
      - redpanda

# --- La base de données s'appelle maintenant 'postgres' ---
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-change_me}
      POSTGRES_DB: marquez
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Marquez Backend ---
  marquez:
    image: marquezproject/marquez:0.50.0
    container_name: marquez
    ports:
      - "5002:5000"   
      - "5001:5001"
    environment:
      MARQUEZ_DB_HOST: postgres   # <-- Il pointe maintenant vers 'postgres'
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB_USER: marquez
      MARQUEZ_DB_PASSWORD: ${MARQUEZ_DB_PASSWORD:-change_me}
      MARQUEZ_DB_NAME: marquez
    depends_on:
      postgres:                   # <-- Il attend 'postgres'
        condition: service_healthy

  # --- Marquez UI ---
  marquez-web:
    image: marquezproject/marquez-web:0.42.0
    container_name: marquez-web
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    depends_on:
      - marquez
  
  neo4j:
    image: neo4j:latest
    container_name: neo4j_cockpit
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-change_me}
      # NEO4J 5 SETTINGS (Notice "server" instead of "dbms")
      - NEO4J_server_memory_heap_initial_size=2G
      - NEO4J_server_memory_heap_max_size=4G
      - NEO4J_server_memory_pagecache_size=2G
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_dbms_memory_transaction_total_max=4G
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
  redis_data:
